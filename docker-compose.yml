services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dd-somalia-api
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload

  postgres:
    image: postgres:16
    container_name: dd-somalia-postgres
    environment:
      POSTGRES_DB: doordash_so
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dd-somalia-redis
    ports:
      - "6379:6379"

volumes:
  pg_data: {}
