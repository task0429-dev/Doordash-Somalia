# Production docker-compose override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dd-somalia-api-prod
    env_file:
      - ./backend/.env.production
    environment:
      - DEBUG=false
      - LOG_LEVEL=warning
    ports:
      - "8000:8000"
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "4"

  postgres:
    image: postgres:16
    container_name: dd-somalia-postgres-prod
    environment:
      POSTGRES_DB: doordash_so
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dd-somalia-redis-prod
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pg_data:
